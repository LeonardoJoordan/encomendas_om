<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Cancela - Encomendas</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
    <header>
        <h1>📦 Encomendas na Cancela</h1>
        <p>Atualização em tempo real</p>
    </header>
    <main>
        <table id="tabela-encomendas" style="table-layout: fixed; width: 100%; word-wrap: break-word;">
            <colgroup>
                <col style="width: 25%;"> <col style="width: 20%;"> <col style="width: 15%;"> <col style="width: 15%;"> <col style="width: 15%;"> <col style="width: 10%;"> </colgroup>
            <thead>
                <tr>
                    <th>Destinatário</th>
                    <th>Descrição</th>
                    <th>Observações</th>
                    <th>Transportadora</th>
                    <th>Chegada</th>
                </tr>
            </thead>
            <tbody id="lista-encomendas">
                </tbody>
        </table>
    </main>
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/ws_client.js"></script>
</body>
</html>
