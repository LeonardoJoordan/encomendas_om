<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Movimentação</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <style>
        body {
            margin: 0;
            padding: 15px;
        }

        #filtros-historico {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
        }

        #filtros-historico label {
            display: flex;
            flex-direction: column;
            font-size: 0.8em;
            font-weight: bold;
            color: #555;
            gap: 4px;
        }

        #filtros-historico input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95em;
        }

        #btn-filtrar {
            padding: 8px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #btn-limpar {
            padding: 8px 15px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #info-resultados {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
        }
        
        /* CSS EXCLUSIVO PARA IMPRESSÃO */
        @media print {
            @page { margin: 1.5cm; }
            body { 
                background: white; 
                padding: 0; 
                margin: 0;
            }
            /* Esconde os filtros e botões na hora de imprimir */
            #filtros-historico, #info-resultados {
                display: none !important;
            }
            /* Mostra o cabeçalho de impressão */
            #cabecalho-impressao {
                display: block !important;
                margin-bottom: 20px;
            }
            /* Tira as cores de fundo dos status para economizar tinta e não ficar ilegível */
            .status-badge {
                border: 1px solid #000;
                color: #000 !important;
                background-color: transparent !important;
                display: inline-block;
                white-space: nowrap; /* Impede que o texto quebre em duas linhas */
            }
            table { 
                border-collapse: collapse; 
                width: 100%; 
            }
            th, td { 
                border: 1px solid #ccc; 
                padding: 6px; /* Reduz um pouco o espaçamento interno */
                font-size: 10px; /* Reduz a fonte, funcionando como o zoom de 80% */
            }
        }

        /* Esconde o cabeçalho de impressão na tela normal */
        #cabecalho-impressao {
            display: none;
        }
    </style>
</head>
<body>

    <section id="filtros-historico">
        <label>
            Data início
            <input type="date" id="filtro-data-inicio">
        </label>
        <label>
            Data fim
            <input type="date" id="filtro-data-fim">
        </label>
        <label>
            Destinatário
            <input type="text" id="filtro-destinatario" placeholder="Nome do destinatário">
        </label>
        <label>
            Recebedor
            <input type="text" id="filtro-recebedor" placeholder="Quem retirou">
        </label>
        <label>
            Porteiro (Nome de Guerra)
            <input type="text" id="filtro-porteiro" placeholder="Nome de guerra">
        </label>
        <button id="btn-filtrar" onclick="carregarHistorico()">🔍 Filtrar</button>
        <button id="btn-limpar" onclick="limparFiltros()">✖ Limpar</button>
        <button id="btn-imprimir" onclick="imprimirRelatorio()" style="margin-left: auto; background-color: #17a2b8; color: white; border: none; border-radius: 4px; padding: 8px 20px; cursor: pointer; font-weight: bold;">🖨️ Imprimir Relatório</button>
        <button id="btn-exportar" onclick="exportarCSV()" style="background-color: #28a745; color: white; border: none; border-radius: 4px; padding: 8px 20px; cursor: pointer; font-weight: bold; margin-left: 10px;">📥 Exportar CSV</button>
    </section>

    <div id="cabecalho-impressao"></div>

    <div id="info-resultados"></div>

    <table id="tabela-historico" style="width: 100%;">
        <thead>
            <tr>
                <th>Recebimento (Portaria)</th>
                <th>Destinatário / Pacote</th>
                <th>Transporte (Entregador)</th>
                <th>Status</th>
                <th>Quem Retirou</th>
                <th>Entregue por</th>
            </tr>
        </thead>
        <tbody id="lista-historico">
            <tr><td colspan="5" style="text-align:center; color:#999;">Use os filtros acima para buscar.</td></tr>
        </tbody>
    </table>

    <div id="controles-paginacao" style="display: none; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding-bottom: 20px;">
        <button id="btn-ant" onclick="mudarPagina(-1)" style="padding: 8px 15px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">⬅ Anterior</button>
        <span id="info-paginacao" style="font-weight: bold; color: #555;">Página 1</span>
        <button id="btn-prox" onclick="mudarPagina(1)" style="padding: 8px 15px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">Próxima ➡</button>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script>
        let paginaAtual = 1;
        const limitePorPagina = 100;
        let totalRegistros = 0;

        async function carregarHistorico(resetarPagina = true) {
            if (resetarPagina) {
                paginaAtual = 1;
            }

            const skip = (paginaAtual - 1) * limitePorPagina;

            const dataInicio    = document.getElementById("filtro-data-inicio").value;
            const dataFim       = document.getElementById("filtro-data-fim").value;
            const destinatario  = document.getElementById("filtro-destinatario").value.trim();
            const recebedor     = document.getElementById("filtro-recebedor").value.trim();
            const porteiro      = document.getElementById("filtro-porteiro").value.trim();

            let url = `/api/historico?skip=${skip}&limit=${limitePorPagina}&`;
            if (dataInicio)     url += `data_inicio=${dataInicio}&`;
            if (dataFim)        url += `data_fim=${dataFim}&`;
            if (destinatario)   url += `destinatario=${encodeURIComponent(destinatario)}&`;
            if (recebedor)      url += `recebedor_nome=${encodeURIComponent(recebedor)}&`;
            if (porteiro)       url += `porteiro_nome_guerra=${encodeURIComponent(porteiro)}&`;

            const tbody = document.getElementById("lista-historico");
            const info  = document.getElementById("info-resultados");
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999;">Buscando...</td></tr>`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Erro ao buscar histórico");

                const respostaJson = await response.json();
                totalRegistros = respostaJson.total;
                const dados = respostaJson.dados;
                
                // Salva apenas a página atual em memória para a impressão
                window.dadosHistorico = dados;
                tbody.innerHTML = "";
                
                atualizarBotoesPaginacao();

                if (dados.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#999;">Nenhum resultado encontrado.</td></tr>`;
                    info.textContent = "";
                    return;
                }

                const inicioExibicao = skip + 1;
                const fimExibicao = Math.min(skip + limitePorPagina, totalRegistros);
                info.textContent = `Mostrando ${inicioExibicao} a ${fimExibicao} de ${totalRegistros} registro(s).`;

                dados.forEach(enc => {
                    const tr = document.createElement("tr");
                    const dataChegada = new Date(enc.data_chegada).toLocaleString('pt-BR');
                    const dataEntrega = enc.data_entrega ? new Date(enc.data_entrega).toLocaleString('pt-BR') : "-";
                    const obsEntrega = enc.observacao_baixa ? `Obs: ${enc.observacao_baixa}` : "Obs: sem observações";
                    const militarEntrega = enc.baixa_porteiro_grad ? `${enc.baixa_porteiro_grad} ${enc.baixa_porteiro_nome}` : "-";
                    const obsTexto = enc.observacao_baixa ? enc.observacao_baixa : "sem observações";
                    const militarEntregaInfo = enc.militar_entrega_grad ? `${enc.militar_entrega_grad} ${enc.militar_entrega_nome}` : "-";

                    tr.innerHTML = `
                        <td>
                            <strong>${escapeHTML(enc.porteiro_graduacao)} ${escapeHTML(enc.porteiro_nome_guerra)}</strong><br>
                            <small>${dataChegada}</small>
                        </td>
                        <td>
                            <strong>${escapeHTML(enc.destinatario)}</strong><br>
                            <small>${escapeHTML(enc.descricao)}</small>
                        </td>
                        <td>
                            <strong>${escapeHTML(enc.empresa_transporte)}</strong><br>
                            <small>${escapeHTML(enc.entregador || "s/i")}</small>
                        </td>
                        <td>
                            <span class="status-badge" style="background-color: ${enc.status === 'Entregue' ? '#28a745' : (enc.status === 'Cancelado' ? '#dc3545' : '#007bff')};">
                                ${escapeHTML(enc.status)}
                            </span>
                        </td>
                        <td>
                            <strong>${enc.status === 'Cancelado' ? '<span style="color: #dc3545;">Registro Cancelado</span>' : escapeHTML(enc.recebedor_nome || "Aguardando...")}</strong><br>
                            <small style="color: #666;"><em>${enc.status === 'Na Portaria' ? "" : 'Obs: ' + escapeHTML(obsTexto)}</em></small>
                        </td>
                        <td>
                            <strong>${escapeHTML(militarEntregaInfo)}</strong><br>
                            <small>${enc.data_entrega ? dataEntrega : "-"}</small>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (error) {
                console.error("Erro:", error);
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Erro ao carregar histórico.</td></tr>`;
            }
        }

        function atualizarBotoesPaginacao() {
            const divControles = document.getElementById("controles-paginacao");
            const btnAnt = document.getElementById("btn-ant");
            const btnProx = document.getElementById("btn-prox");
            const infoPag = document.getElementById("info-paginacao");

            if (totalRegistros > 0) {
                divControles.style.display = "flex";
                const totalPaginas = Math.ceil(totalRegistros / limitePorPagina);
                infoPag.textContent = `Página ${paginaAtual} de ${totalPaginas}`;

                btnAnt.disabled = paginaAtual === 1;
                btnAnt.style.opacity = paginaAtual === 1 ? "0.5" : "1";
                btnAnt.style.cursor = paginaAtual === 1 ? "not-allowed" : "pointer";

                btnProx.disabled = paginaAtual === totalPaginas;
                btnProx.style.opacity = paginaAtual === totalPaginas ? "0.5" : "1";
                btnProx.style.cursor = paginaAtual === totalPaginas ? "not-allowed" : "pointer";
            } else {
                divControles.style.display = "none";
            }
        }

        function mudarPagina(direcao) {
            paginaAtual += direcao;
            carregarHistorico(false); // false = mantém os filtros, altera apenas o Offset
        }

        function limparFiltros() {
            document.getElementById("filtro-data-inicio").value = "";
            document.getElementById("filtro-data-fim").value = "";
            document.getElementById("filtro-destinatario").value = "";
            document.getElementById("filtro-recebedor").value = "";
            document.getElementById("filtro-porteiro").value = "";
            document.getElementById("info-resultados").textContent = "";
            document.getElementById("lista-historico").innerHTML = 
                `<tr><td colspan="6" style="text-align:center; color:#999;">Use os filtros acima para buscar.</td></tr>`;
            document.getElementById("controles-paginacao").style.display = "none";
        }

        function imprimirRelatorio() {
            const tbody = document.getElementById("lista-historico");
            
            // Impede imprimir tela vazia
            if (tbody.innerHTML.includes("Use os filtros") || tbody.innerHTML.includes("Nenhum resultado") || tbody.innerHTML.includes("Buscando")) {
                alert("Por favor, realize uma busca com resultados antes de imprimir.");
                return;
            }

            // Pega os valores atuais dos campos
            const dataInicio = document.getElementById("filtro-data-inicio").value;
            const dataFim = document.getElementById("filtro-data-fim").value;
            const destinatario = document.getElementById("filtro-destinatario").value.trim();
            const recebedor = document.getElementById("filtro-recebedor").value.trim();
            const porteiro = document.getElementById("filtro-porteiro").value.trim();

            let filtrosAplicados = [];

            // Helper para formatar data (YYYY-MM-DD para DD/MM/YYYY)
            const formataData = (dataStr) => {
                const [ano, mes, dia] = dataStr.split('-');
                return `${dia}/${mes}/${ano}`;
            };

            // Monta o texto de período
            if (dataInicio || dataFim) {
                let periodo = "Período: ";
                if (dataInicio && dataFim) periodo += `de ${formataData(dataInicio)} a ${formataData(dataFim)}`;
                else if (dataInicio) periodo += `A partir de ${formataData(dataInicio)}`;
                else if (dataFim) periodo += `Até ${formataData(dataFim)}`;
                filtrosAplicados.push(periodo);
            }
            
            // Monta os outros textos
            if (destinatario) filtrosAplicados.push(`Destinatário: ${destinatario}`);
            if (recebedor) filtrosAplicados.push(`Recebedor final: ${recebedor}`);
            if (porteiro) filtrosAplicados.push(`Porteiro (Cancela): ${porteiro}`);

            // Define o texto final
            let textoFiltro = filtrosAplicados.length > 0 ? filtrosAplicados.join(" | ") : "Todos os registros";

            // Injera o texto no cabeçalho de impressão
            const cabecalho = document.getElementById("cabecalho-impressao");
            const dataAtual = new Date().toLocaleString('pt-BR');
            cabecalho.innerHTML = `
                <h2 style="margin-bottom: 5px; border-bottom: 2px solid #000; padding-bottom: 5px; text-transform: uppercase;">Relatório de Movimentação - Cancela</h2>
                <p style="font-size: 14px; margin-top: 5px;"><strong>Filtros aplicados:</strong> ${textoFiltro}</p>
                <p style="font-size: 12px; color: #555; text-align: right; margin-bottom: 15px;"><em>Gerado em: ${dataAtual}</em></p>
            `;

            // Aciona o painel de impressão do navegador
            window.print();
        }

        async function exportarCSV() {
            if (totalRegistros === 0) {
                alert("Realize uma busca com resultados antes de exportar.");
                return;
            }

            const btnExportar = document.getElementById("btn-exportar");
            btnExportar.textContent = "⏳ Gerando...";
            btnExportar.disabled = true;

            try {
                // Monta a URL ignorando paginação (limit=0) para puxar todos os registros de uma vez
                const dataInicio    = document.getElementById("filtro-data-inicio").value;
                const dataFim       = document.getElementById("filtro-data-fim").value;
                const destinatario  = document.getElementById("filtro-destinatario").value.trim();
                const recebedor     = document.getElementById("filtro-recebedor").value.trim();
                const porteiro      = document.getElementById("filtro-porteiro").value.trim();

                let url = `/api/historico?skip=0&limit=0&`;
                if (dataInicio)     url += `data_inicio=${dataInicio}&`;
                if (dataFim)        url += `data_fim=${dataFim}&`;
                if (destinatario)   url += `destinatario=${encodeURIComponent(destinatario)}&`;
                if (recebedor)      url += `recebedor_nome=${encodeURIComponent(recebedor)}&`;
                if (porteiro)       url += `porteiro_nome_guerra=${encodeURIComponent(porteiro)}&`;

                const response = await fetch(url);
                if (!response.ok) throw new Error("Falha na extração de dados");
                
                const respostaJson = await response.json();
                const dadosCompletos = respostaJson.dados;

                // O BOM (\uFEFF) força o Microsoft Excel a reconhecer o arquivo como UTF-8 e manter a acentuação correta
                let csvContent = "\uFEFF";
                
                // Cabeçalho das colunas separados por ponto e vírgula (Padrão PT-BR do Excel)
                csvContent += "Data de chegada;Cancela entrada;Destinatário;Descrição;Transportadora;Entregador;Status;Quem retirou;Data da Entrega;Cancela Saída;Observações\n";

                dadosCompletos.forEach(enc => {
                const dataChegada = enc.data_chegada ? new Date(enc.data_chegada).toLocaleString('pt-BR') : "";
                const dataEntrega = enc.data_entrega ? new Date(enc.data_entrega).toLocaleString('pt-BR') : "";
                
                // Trata cada campo envolvendo em aspas duplas para evitar que um ';' ou quebra de linha no texto quebre as colunas da planilha
                const linha = [
                    dataChegada,
                    `${enc.porteiro_graduacao} ${enc.porteiro_nome_guerra}`,
                    enc.destinatario,
                    enc.descricao,
                    enc.empresa_transporte,
                    enc.entregador,
                    enc.status,
                    enc.recebedor_nome,
                    dataEntrega,
                    enc.militar_entrega_grad ? `${enc.militar_entrega_grad} ${enc.militar_entrega_nome}` : "",
                    enc.observacao_baixa
                ].map(campo => {
                    let valor = campo ? String(campo) : "";
                    valor = valor.replace(/"/g, '""'); // Escapa aspas duplas internas
                    return `"${valor}"`;
                }).join(";");

                csvContent += linha + "\n";
            });

            // Cria o arquivo virtual invisível no navegador e clica nele para forçar o download
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const blobUrl = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            link.setAttribute("href", blobUrl);
            link.setAttribute("download", "historico_movimentacao_cancela.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            btnExportar.textContent = "📥 Exportar CSV";
            btnExportar.disabled = false;
            
            } catch (error) {
                alert("Erro ao exportar arquivo: " + error.message);
                btnExportar.textContent = "📥 Exportar CSV";
                btnExportar.disabled = false;
            }
        }
    </script>
</body>
</html>
