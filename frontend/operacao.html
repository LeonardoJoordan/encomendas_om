<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação - Portaria</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <style>
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        #historico-tab.active {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
        }
        #historico-tab iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
        #form-entrada {
            flex-direction: column;
            align-items: flex-start;
        }

        .linha-encomenda {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        #container-encomendas {
            width: 100%;
        }
    </style>
    <script>
        // O CADEADO DA OPERAÇÃO (Memória Volátil)
        const userRole = sessionStorage.getItem('userRole');
        
        // Se o papel não for nem 'cancela' e nem 'admin', bloqueia
        if (userRole !== 'cancela' && userRole !== 'admin') {
            window.location.href = '/frontend/login.html'; 
        }
    </script>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin: 0;">🚧 Painel da Cancela</h1>
        <button onclick="fazerLogout()" style="background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">🚪 Sair</button>
    </header>
    
    <main>
        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('operacao-ativa')">Registro de Encomendas</button>
            <button class="tab-btn" onclick="switchTab('historico-tab')">Histórico de Movimentação</button>
        </nav>

        <div id="operacao-ativa" class="tab-content active">
            <section id="nova-encomenda">
                <h2>📦 Registrar Entrada</h2>
                <form id="form-entrada">
                    <div id="container-encomendas">
                        </div>
                        <datalist id="lista-transportadoras">
                            <option value="Correios">
                            <option value="Mercado Livre">
                            <option value="Amazon">
                            <option value="Loggi">
                            <option value="Jadlog">
                            <option value="Total Express">
                            <option value="Shopee">
                            <option value="Moto Entrega / Office Boy">
                        </datalist>

                        <datalist id="lista-descricoes">
                            <option value="Caixa pequena">
                            <option value="Caixa média">
                            <option value="Caixa grande">
                            <option value="Emb. tipo e-commerce">
                            <option value="Envelope de papel">
                            <option value="Malote">
                        </datalist>

                        <datalist id="lista-observacoes">
                            <option value="Sem alteração">
                            <option value="Emb. violada">
                            <option value="Emb. amassada / danificada">
                            <option value="Emb. molhada / úmida">
                            <option value="Entrega fora do prazo">
                        </datalist>
                    
                    <button type="button" onclick="adicionarLinhaEncomenda()" style="margin: 15px 0;">+ Adicionar encomenda</button>

                    <div style="background: #e9ecef; padding: 20px; border-radius: 8px;">
                        <input type="password" id="pin-entrada" placeholder="ID + PIN do Usuário" required style="padding: 10px;">
                        <button type="submit" style="background-color: #28a745; color: white; padding: 10px 20px; font-weight: bold;">Dar Entrada no Lote</button>
                    </div>

                    <div style="margin-top: 8px; text-align: left; width: 100%;">
                        <small><a href="#" onclick="abrirModalIDs()" style="color: #007bff; text-decoration: none; font-weight: bold;">🔍 Qual é o meu ID?</a></small>
                    </div>
                </form>
            </section>

            <hr style="margin: 30px 0;">

            <section id="baixa-encomenda">
                <h2>🚚 Encomendas na Cancela (Dar Baixa)</h2>
                <table id="tabela-baixa" style="width: 100%;">
                    <thead>
                        <tr>
                            <tr>
                            <th>ID</th>
                            <th>Entrada</th>
                            <th>Destinatário</th>
                            <th>Descrição</th>
                            <th>Obs</th>
                            <th>Empresa</th>
                            <th>Recebedor (Cancela)</th>
                            <th>Ação</th>
                        </tr>
                        </tr>
                    </thead>
                    <tbody id="lista-baixa"></tbody>
                </table>
            </section>
        </div>

        <div id="historico-tab" class="tab-content">
            <iframe src="/frontend/historico.html"></iframe>
        </div>
    </main>

    <div id="modal-pin" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; width: 400px;">
        <h3>Confirmar Entrega</h3>
        <input type="hidden" id="encomenda-id-baixa">
        <label>Quem está retirando?</label>
        <input type="text" id="recebedor-nome" placeholder="Nome/Graduação" required style="width: 100%; margin: 10px 0; padding: 8px;">
        <label>Observações:</label>
        <textarea id="obs-baixa" placeholder="Ex: Deixado com o plantão..." style="width: 100%; margin: 10px 0; padding: 8px; height: 60px;"></textarea>
        <label>Seu PIN de Porteiro:</label>
        <input type="password" id="pin-baixa" placeholder="Digite seu PIN" required style="width: 100%; margin: 10px 0; padding: 8px;">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="btn-confirmar-baixa" style="flex: 1; background: #28a745; color: white; padding: 10px; border: none; border-radius: 4px;">Confirmar</button>
            <button onclick="document.getElementById('modal-pin').style.display='none'" style="flex: 1; background: #6c757d; color: white; border: none; border-radius: 4px;">Cancelar</button>
        </div>
    </div>

    <div id="modal-cancelar" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; width: 400px;">
        <h3 style="color: #dc3545;">⚠️ Excluir Registro</h3>
        <input type="hidden" id="encomenda-id-cancelar">
        <label>Motivo da exclusão:</label>
        <input type="text" id="motivo-cancelar" placeholder="Ex: Duplicado, erro de digitação..." required style="width: 100%; margin: 10px 0; padding: 8px;">
        <label>Seu PIN de Porteiro:</label>
        <input type="password" id="pin-cancelar" placeholder="Digite seu PIN" required style="width: 100%; margin: 10px 0; padding: 8px;">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="btn-confirmar-cancelar" style="flex: 1; background: #dc3545; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer;">Confirmar Exclusão</button>
            <button onclick="document.getElementById('modal-cancelar').style.display='none'" style="flex: 1; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">Voltar</button>
        </div>
    </div>

    

    <div id="modal-lista-ids" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; width:90%; max-width:400px; max-height: 80vh; overflow-y: auto;">
            <h3>Lista de Identificação (ID)</h3>
            <table style="width:100%; margin-bottom:15px;">
                <thead>
                    <tr><th>ID</th><th>Militar</th></tr>
                </thead>
                <tbody id="corpo-tabela-ids">
                    </tbody>
            </table>
            <button onclick="document.getElementById('modal-lista-ids').style.display='none'" style="width:100%; background:#6c757d;">Fechar</button>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/app.js"></script>
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
    <script>
        function fazerLogout() {
            sessionStorage.removeItem('userToken');
            sessionStorage.removeItem('userRole');
            sessionStorage.removeItem('userName');
            window.location.href = '/';
        }
    </script>
</body>
</html>
