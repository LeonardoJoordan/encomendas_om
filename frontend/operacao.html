<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operação - Portaria</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body>
    <header>
        <h1>🛡️ Painel da Cancela</h1>
    </header>
    
    <main>
        <nav class="tabs">
            <button class="tab-btn active" onclick="switchTab('operacao-ativa')">Operação Atual</button>
            <button class="tab-btn" onclick="switchTab('historico-tab')">Histórico de Movimentação</button>
        </nav>

        <div id="operacao-ativa" class="tab-content active">
            <section id="nova-encomenda">
                <h2>📦 Registrar Entrada</h2>
                <form id="form-entrada">
                    <div id="container-encomendas">
                        <div class="linha-encomenda">
                            <input type="text" class="destinatario" placeholder="Destinatário" required>
                            <input type="text" class="descricao" placeholder="Descrição do pacote" required>
                            <input type="text" class="observacoes" placeholder="Observações do pacote">
                            <select class="empresa-transporte" required>
                                <option value="">Empresa...</option>
                                <option value="Correios">Correios</option>
                                <option value="Mercado Livre">Mercado Livre</option>
                                <option value="Shopee">Shopee</option>
                                <option value="Moto Entrega">Moto Entrega Local</option>
                                <option value="Outros">Outros</option>
                            </select>
                            <input type="text" class="entregador" placeholder="Nome entregador" required>
                            <button type="button" class="btn-remover" onclick="this.parentElement.remove()">❌</button>
                        </div>
                    </div>
                    
                    <button type="button" onclick="adicionarLinhaEncomenda()" style="margin: 15px 0;">+ Adicionar encomenda</button>

                    <div style="background: #e9ecef; padding: 20px; border-radius: 8px;">
                        <input type="password" id="pin-entrada" placeholder="PIN da Cancela" required style="padding: 10px;">
                        <button type="submit" style="background-color: #28a745; color: white; padding: 10px 20px; font-weight: bold;">Dar Entrada no Lote</button>
                    </div>
                </form>
            </section>

            <hr style="margin: 30px 0;">

            <section id="baixa-encomenda">
                <h2>🚚 Encomendas na Portaria (Dar Baixa)</h2>
                <table id="tabela-baixa" style="width: 100%;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Destinatário</th>
                            <th>Descrição</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody id="lista-baixa"></tbody>
                </table>
            </section>
        </div>

        <div id="historico-tab" class="tab-content">
            <h2>📜 Histórico Recente</h2>
            <section id="filtros-historico" style="background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="date" id="filtro-data-inicio">
                <input type="date" id="filtro-data-fim">
                <button onclick="carregarHistorico()">Filtrar</button>
            </section>
            
            <table id="tabela-historico" style="width: 100%;">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Destinatário</th>
                        <th>Empresa</th>
                        <th>Status</th>
                        <th>Recebido por</th>
                    </tr>
                </thead>
                <tbody id="lista-historico"></tbody>
            </table>
        </div>  
    </main>

    <div id="modal-pin" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; width: 400px;">
        <h3>Confirmar Entrega</h3>
        <input type="hidden" id="encomenda-id-baixa">
        <label>Quem está retirando?</label>
        <input type="text" id="recebedor-nome" placeholder="Nome/Graduação" required style="width: 100%; margin: 10px 0; padding: 8px;">
        <label>Observações:</label>
        <textarea id="obs-baixa" placeholder="Ex: Deixado com o plantão..." style="width: 100%; margin: 10px 0; padding: 8px; height: 60px;"></textarea>
        <label>Seu PIN de Porteiro:</label>
        <input type="password" id="pin-baixa" placeholder="Digite seu PIN" required style="width: 100%; margin: 10px 0; padding: 8px;">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="btn-confirmar-baixa" style="flex: 1; background: #28a745; color: white; padding: 10px; border: none; border-radius: 4px;">Confirmar</button>
            <button onclick="document.getElementById('modal-pin').style.display='none'" style="flex: 1; background: #6c757d; color: white; border: none; border-radius: 4px;">Cancelar</button>
        </div>
    </div>

    <script src="/frontend/js/app.js"></script>
    <script src="/frontend/js/historico.js"></script>
</body>
</html>
