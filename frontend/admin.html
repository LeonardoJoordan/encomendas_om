<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Administrador - Gestão</title>
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <script>
        // O CADEADO DO ADMIN (Memória Volátil)
        const userRole = sessionStorage.getItem('userRole');
        
        // Se não for admin, chuta de volta para o login
        if (userRole !== 'admin') {
            window.location.href = '/frontend/login.html'; 
        }
    </script>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin: 0;">🛡️ Área Administrativa</h1>
        <button onclick="fazerLogout()" style="background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">🚪 Sair</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('cadastro-tab')">Cadastro de Cancelas</button>
        <button class="tab-btn" onclick="switchTab('historico-tab')">Histórico de Movimentação</button>
    </div>

    <div id="cadastro-tab" class="tab-content active">

    <main>
        <section id="gerenciar-porteiro">
            <h2>Cadastrar / Editar Cancela</h2>
            <form id="form-admin">
                <input type="hidden" id="porteiro-id">
                <input type="text" id="porteiro-graduacao" placeholder="Graduação (ex: Sd, Cb, Sgt)" required>
                <input type="text" id="porteiro-nome-guerra" placeholder="Nome de Guerra" required>
                <input type="text" id="porteiro-nome" placeholder="Nome Completo" required>
                <input type="text" id="porteiro-login" placeholder="Login de Acesso" required>
                <input type="text" id="porteiro-pin" placeholder="PIN da Cancela" required>
                <button type="submit" id="btn-salvar">Salvar Porteiro</button>
                <button type="button" id="btn-cancelar" style="display: none; background-color: #dc3545;" onclick="cancelarEdicao()">Cancelar</button>
            </form>
        </section>

        <hr>

        <section id="lista-efetivo">
            <h2>Efetivo Cadastrado</h2>
            <table id="tabela-porteiros" style="table-layout: fixed; width: 100%;">
                <colgroup>
                    <col style="width: 3.5%;">  <col style="width: 7.1%;">  <col style="width: 14.3%;"> <col style="width: 35.7%;"> <col style="width: 14.3%;"> <col style="width: 14.3%;"> <col style="width: 10.8%;"> </colgroup>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Grad</th>
                        <th>Nome de Guerra</th>
                        <th>Nome</th>
                        <th>Login</th>
                        <th>PIN</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tbody-porteiros">
                    </tbody>
            </table>
        </section>
    </main>

    </div> <div id="historico-tab" class="tab-content">
        <iframe src="historico.html" width="100%" height="850px" style="border: none; border-radius: 8px; background: white;"></iframe>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/admin.js"></script>
    <script>
        function switchTab(tabId) {
            // 1. Esconde todos os painéis e tira a cor verde de todos os botões
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // 2. Mostra o painel correto
            document.getElementById(tabId).classList.add('active');

            // 3. Pinta o botão clicado de verde
            const botaoAtivo = document.querySelector(`button[onclick="switchTab('${tabId}')"]`);
            if (botaoAtivo) {
                botaoAtivo.classList.add('active');
            }
        }
    </script>
    <script>
        function fazerLogout() {
            // Limpa o crachá da memória
            sessionStorage.removeItem('userToken');
            sessionStorage.removeItem('userRole');
            sessionStorage.removeItem('userName');
            
            // Redireciona para a página inicial
            window.location.href = '/';
        }
    </script>
</body>
</html>
